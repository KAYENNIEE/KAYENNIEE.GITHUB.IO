<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Graduation, Azhea ❤️</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; image-rendering: pixelated; }

body, html {
  margin: 0; padding: 0; width: 100%; height: 100%;
  font-family: 'Press Start 2P', cursive;
  overflow: hidden; background-color: #ff9a9e;
}

.pixel-bg {
  background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
  background-size: 20px 20px;
  background-image: radial-gradient(#ffffff 1px, transparent 1px);
  display: flex; justify-content: center; align-items: center;
}

#interface { position: relative; z-index: 10; width: 95%; max-width: 460px; }

#startScreen {
  background: #fff; border: 6px solid #ff4d6d; padding: 80px 20px;
  text-align: center; box-shadow: 10px 10px 0 #c9184a; border-style: outset; cursor: pointer;
}

#speakerName {
  font-size: 14px; color: #fff; background: linear-gradient(#ff4d6d, #c9184a);
  display: inline-block; padding: 12px 24px; border: 4px solid #fff;
  border-bottom: none; margin-left: 10px; position: relative; top: 6px; z-index: 11;
  box-shadow: 4px 0 0 #c9184a; border-style: outset;
}

#chatbox {
  background: #fff; border: 8px solid #ff4d6d; padding: 35px; min-height: 480px;
  display: flex; flex-direction: column; justify-content: space-between;
  box-shadow: 12px 12px 0 #c9184a; border-style: inset;
  transition: all 0.5s ease;
}

.message { font-size: 15px; color: #222; line-height: 2.1; min-height: 280px; }

.btn {
  font-family: 'Press Start 2P', cursive; background: #ff4d6d; color: #fff;
  border: 4px solid #fff; padding: 22px; font-size: 12px; cursor: pointer; 
  width: 100%; margin-top: 10px; position: relative; box-shadow: 0 6px 0 #c9184a; 
}
.btn:active { top: 4px; box-shadow: 0 2px 0 #800e2b; }

#miniGameScreen {
  display: none; position: absolute; width: 100%; height: 100%;
  flex-direction: column; align-items: center; justify-content: center;
  background: #4caf50;
}
canvas { background: #4caf50; width: 100%; height: 540px; border-top: 8px solid #333; border-bottom: 8px solid #333; }
#progressBar { position: absolute; top: 20px; width: 85%; height: 15px; background: #222; border: 3px solid #ffde00; z-index: 10; }
#progressFill { width: 0%; height: 100%; background: #e60000; }
#azheaBtn { 
    width: 120px; height: 120px; background: radial-gradient(#ff4d6d, #c9184a); color: white; border: 6px solid #fff;
    font-size: 14px; border-radius: 50%; box-shadow: 0 10px 0 #800e2b;
    position: relative; z-index: 100; margin-top: 15px;
}

@keyframes shake {
  0% { transform: translate(1px, 1px) rotate(0deg); }
  20% { transform: translate(-3px, 0px) rotate(1deg); }
  40% { transform: translate(3px, 2px) rotate(-1deg); }
  100% { transform: translate(1px, -2px) rotate(0deg); }
}

@keyframes glitchFade {
  0% { opacity: 1; }
  30% { filter: invert(1) hue-rotate(90deg); transform: skewX(20deg); }
  100% { opacity: 0; filter: blur(40px); }
}

.cold-mode { background-color: #1a002b !important; animation: shake 0.15s infinite; }
.cold-box { border-color: #4b0082 !important; background: #000 !important; box-shadow: 0 0 40px #00f7ff !important; }
.cold-text { color: #00f7ff !important; text-shadow: 2px 2px #4b0082; }
.final-glitch { animation: glitchFade 3.5s forwards !important; }

@keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body class="pixel-bg">

<div id="interface">
  <div id="startScreen">
    <h1 style="font-size: 18px; color: #ff4d6d; margin-bottom: 30px;">HAPPY GRADUATION! ❤️</h1>
    <p style="font-size: 10px; color: #c9184a; animation: blink 0.8s infinite;">[ TOUCH TO OPEN ]</p>
  </div>

  <div id="chatWrap" style="display:none;">
    <div id="speakerName">YENNIE</div>
    <div id="chatbox">
      <div class="message" id="text"></div>
      <div id="choices"></div>
    </div>
  </div>
</div>

<div id="miniGameScreen">
  <div id="progressBar"><div id="progressFill"></div></div>
  <canvas id="gameCanvas"></canvas>
  <button id="azheaBtn">PUSH!</button>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let isTyping = false;

function playPop(freq = 400, dur = 0.1) { 
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.frequency.setValueAtTime(freq + Math.random()*150, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
}

const introSteps = [
  { text: "Congratulations on your graduation, Azhea. Seeing you reach this milestone today makes me incredibly proud of everything you have accomplished.", choices: [{text: "THANK YOU", next: 1}] },
  { text: "I have honestly wanted to say this to you in person so many times, but I always hold back because I am scared I might make things awkward or ruin the moment.", choices: [{text: "NEXT", next: 2}] },
  { text: "I really want to talk to you more often. I cannot help but notice how cool you look in that Ferrari jacket you always wear. It really suits you.", choices: [{text: "DO YOU THINK SO?", next: 3}] },
  { text: "You know I am a huge Red Bull fan so I usually cannot stand seeing Ferrari win, but seeing you in that jacket and knowing you accept my gifts truly makes my day.", choices: [{text: "NEXT", next: 4}] },
  { text: "Since today is a celebration, let us have some fun. Your Ferrari against my Red Bull at the Shanghai Circuit. Are you ready to race?", choices: [{text: "START RACE!", next: "miniGame"}] }
];

const winSteps = [
    { text: "Dang it. Red Bull lost the race again. I should have known better than to challenge you when you are at your best.", choices: [{text: "NEXT", next: 1}] },
    { text: "Anyway, great job today. You handled that track perfectly, just like how you have handled every obstacle to get to this graduation ceremony.", choices: [{text: "NEXT", next: 2}] },
    { text: "I am really happy to be here witnessing your success. Even if I am just a quiet supporter, I hope you feel how much this day means.", choices: [{text: "NEXT", next: 3}] },
    { text: "I will wait.", choices: [], special: "cold" },
    { text: "Azhea.", choices: [], special: "end" }
];

const loseSteps = [
    { text: "It is okay to lose sometimes. In life, even the strongest people have days when they fall behind, but that does not mean they have failed.", choices: [{text: "NEXT", next: 1}] },
    { text: "Even when things get dark and the path feels uncertain, every journey has its end. Keep going, your best days are still ahead.", choices: [{text: "NEXT", next: 2}] },
    { text: "Sometimes the road is hard and progress feels slow. Keep moving forward, your journey is just beginning.", choices: [{text: "NEXT", next: 3}] },
    { text: "I will wait.", choices: [], special: "cold" },
    { text: "Azhea.", choices: [], special: "end" }
];

function typeWriter(text, i = 0, callback) {
  isTyping = true;
  const target = document.getElementById('text');
  target.innerHTML = text.substring(0, i + 1).replace(/\n/g, '<br>');
  if(i < text.length) playPop(document.body.classList.contains('cold-mode') ? 60 : 350);
  if (i < text.length - 1) {
    setTimeout(() => typeWriter(text, i + 1, callback), 50);
  } else {
    isTyping = false;
    if(callback) callback();
  }
}

function showStep(idx, set = introSteps) {
  if (isTyping) return;
  if(idx === "miniGame") {
    document.getElementById('interface').style.display = "none";
    document.getElementById('miniGameScreen').style.display = "flex";
    startRace(); return;
  }
  
  const cd = document.getElementById('choices');
  const cb = document.getElementById('chatbox');
  const msg = document.getElementById('text');
  cd.innerHTML = "";

  typeWriter(set[idx].text, 0, () => {
    if(set[idx].special === "cold") {
        document.body.classList.add('cold-mode');
        cb.classList.add('cold-box');
        msg.classList.add('cold-text');
        setTimeout(() => showStep(idx + 1, set), 3000);
    } else if (set[idx].special === "end") {
        cb.classList.add('final-glitch');
        setTimeout(() => location.reload(), 4000);
    } else {
        set[idx].choices.forEach(c => {
            const b = document.createElement("button");
            b.className = "btn"; b.textContent = c.text;
            b.onclick = () => showStep(c.next, set);
            cd.appendChild(b);
        });
    }
  });
}

document.getElementById('startScreen').onclick = () => {
  audioCtx.resume();
  document.getElementById('startScreen').style.display = "none";
  document.getElementById('chatWrap').style.display = "block";
  showStep(0);
};

// --- F1 WORLD CHAMPION ENGINE ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = 540;

let playerX = 50, aiX = 50, isGameOver = false, cameraOffset = 0, shake = 0;
let playerVel = 0, aiVel = 14.5; // IMPOSSIBLE MAX
let friction = 0.93;
let trackLength = 15000;

function drawScenery(offset) {
    // Grass
    ctx.fillStyle = "#2e7d32";
    ctx.fillRect(0, 0, canvas.width, 160);
    ctx.fillRect(0, 440, canvas.width, 100);

    // Decorative Trees
    for(let i = -1000; i < trackLength + 2000; i += 800) {
        let tx = i - offset;
        if(tx > -100 && tx < canvas.width + 100) {
            ctx.fillStyle = "#1b5e20"; ctx.fillRect(tx, 120, 20, 40); // Tree top
            ctx.fillStyle = "#4e342e"; ctx.fillRect(tx + 8, 160, 4, 10); // Trunk
        }
    }

    // Grandstands / Audience
    ctx.fillStyle = "#555";
    ctx.fillRect(0, 40, canvas.width, 80);
    for(let i = 0; i < canvas.width; i += 10) {
        ctx.fillStyle = `hsl(${Math.random() * 360}, 70%, 50%)`;
        ctx.fillRect(i, 50 + (Math.sin(Date.now()/100 + i)*5), 6, 6);
    }

    // Sponsorship Banners
    const brands = ["RED BULL", "FERRARI", "MERCEDES", "PIRELLI", "MCLAREN"];
    for(let i = -1000; i < trackLength + 2000; i += 1200) {
        let bx = i - offset;
        ctx.fillStyle = "#fff"; ctx.fillRect(bx, 170, 250, 40);
        ctx.fillStyle = "#000"; ctx.font = "10px 'Press Start 2P'";
        ctx.fillText(brands[(i/1200)%brands.length], bx + 20, 195);
    }
}

function drawF1(x, y, color, label, isPlayer) {
    let sx = x - cameraOffset + (isPlayer ? Math.random()*shake - shake/2 : 0);
    ctx.save();
    ctx.translate(sx, y);
    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(10, 38, 110, 10); // Shadow
    ctx.fillStyle = "#111"; ctx.fillRect(100, 5, 15, 30); // Aero
    ctx.fillStyle = color; ctx.fillRect(20, 10, 85, 20); // Body
    ctx.fillRect(45, 0, 30, 40); // Sidepods
    ctx.fillStyle = "#000"; ctx.fillRect(58, 12, 10, 10); // Cockpit
    ctx.fillStyle = color; ctx.fillRect(0, -5, 15, 50); // Wing
    ctx.fillStyle = "#111"; ctx.fillRect(12, -10, 28, 18); ctx.fillRect(12, 32, 28, 18);
    ctx.fillRect(88, -8, 22, 15); ctx.fillRect(88, 33, 22, 15);
    ctx.fillStyle = "#fff"; ctx.font = "10px 'Press Start 2P'"; ctx.fillText(label, 0, -35);
    ctx.restore();
}

function update() {
    if(isGameOver) return;
    ctx.clearRect(0,0,canvas.width, canvas.height);
    
    playerVel *= friction; playerX += playerVel; aiX += aiVel;
    cameraOffset += (playerX - cameraOffset - 120) * 0.15; shake *= 0.85;

    drawScenery(cameraOffset);

    // Track Surface
    ctx.fillStyle = "#333"; ctx.fillRect(0, 220, canvas.width, 220);
    for(let i=-2000; i<trackLength+2000; i+=400){
        let cx = i - cameraOffset;
        ctx.fillStyle = (Math.floor(i/400)%2==0)?"#fff":"#cc0000";
        ctx.fillRect(cx, 220, 400, 12); ctx.fillRect(cx, 428, 400, 12);
        if(i >= trackLength && i < trackLength+400) {
            for(let py=232; py<428; py+=40) {
                for(let px=0; px<200; px+=40) {
                    ctx.fillStyle = ((px+py)/40 % 2 == 0) ? "#fff" : "#000";
                    ctx.fillRect(cx + px, py, 40, 40);
                }
            }
        }
    }

    drawF1(aiX, 245, "#001a4d", "MAX VERSTAPPEN", false);
    drawF1(playerX, 345, "#e60000", "AZHEA", true);
    document.getElementById('progressFill').style.width = (playerX/trackLength)*100 + "%";
    
    if(aiX > trackLength) finishRace(false);
    if(playerX > trackLength) finishRace(true);
    if(!isGameOver) requestAnimationFrame(update);
}

function finishRace(won) {
    isGameOver = true;
    setTimeout(() => {
        document.getElementById('miniGameScreen').style.display = "none";
        document.getElementById('interface').style.display = "block";
        showStep(0, won ? winSteps : loseSteps);
    }, 2000);
}

function startRace() {
    playerX = 50; aiX = 50; playerVel = 0; isGameOver = false;
    update();
}

document.getElementById('azheaBtn').onclick = () => { 
    if(!isGameOver){ playerVel += 18; shake = 30; playPop(180, 0.05); } 
};
</script>
</body>
</html>
