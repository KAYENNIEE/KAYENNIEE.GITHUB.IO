<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Ilah</title>
    <!-- Video Game / Minecraft Style Pixel Font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-darker: #f0b6cf;
            --bg-pastel: #ffe3f0;
            --card-bg: rgba(255, 245, 250, 0.94); 
            --border-color: #381e2b;
            --text-color: #4a2737;
            --pink-accent: #ffa6c5;
            --pink-glow: #ff73a1;
            --window-shadow: 0 16px 35px rgba(214, 153, 179, 0.7);
        }

        * {
            box-sizing: border-box;
            font-family: 'Press Start 2P', monospace;
            image-rendering: pixelated;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-pastel);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: var(--text-color);
            position: relative;
        }

        /* ---------------- ADVANCED BACKGROUND DESIGN ---------------- */

        /* Diagonally Drifting Retro Game Grid Texture */
        .bg-grid-drift {
            position: absolute;
            top: 0; left: 0; width: 200%; height: 200%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.45) 4px, transparent 4px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.45) 4px, transparent 4px);
            background-size: 32px 32px;
            animation: gridScroll 25s linear infinite;
            z-index: 1;
        }

        @keyframes gridScroll {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50%, -50%); }
        }

        /* Scanline Overlay for Arcade Feel */
        .arcade-scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                rgba(0, 0, 0, 0) 0%,
                rgba(0, 0, 0, 0) 75%,
                rgba(247, 186, 211, 0.25) 75%,
                rgba(247, 186, 211, 0.25) 100%
            );
            background-size: 100% 16px;
            z-index: 2;
            pointer-events: none;
        }

        /* Floating Vector Block-Sparkles Layer */
        .starfield {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            overflow: hidden;
            z-index: 3;
            pointer-events: none;
        }

        .block-star {
            position: absolute;
            background-color: #fff;
            width: 12px; height: 12px;
            animation: floatTwinkle 12s linear infinite;
            opacity: 0;
        }

        @keyframes floatTwinkle {
            0% { transform: translateY(105vh) rotate(0deg); opacity: 0; }
            20% { opacity: 0.7; }
            80% { opacity: 0.7; }
            100% { transform: translateY(-10vh) rotate(180deg); opacity: 0; }
        }

        /* ---------------- VIEWPORT WINDOW SYSTEM ---------------- */

        .game-window-container {
            width: 92%;
            max-width: 360px;
            height: 495px;
            position: relative;
            perspective: 1400px;
            z-index: 10;
            animation: floatingSystem 4.5s ease-in-out infinite;
        }

        @keyframes floatingSystem {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        /* ---------------- UNSEAL ENVELOPE DESIGN ---------------- */

        .envelope {
            width: 100%;
            height: 100%;
            background-color: var(--pink-accent);
            border: 8px solid var(--border-color);
            box-shadow: 0 16px 0 rgba(56, 30, 43, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: absolute;
            z-index: 30;
            transform-style: preserve-3d;
            transition: transform 0.9s cubic-bezier(0.6, -0.28, 0.735, 0.045), opacity 0.7s, visibility 0.7s;
            padding: 24px;
        }

        /* Folded Triangular Graphic Envelope Block */
        .envelope::before {
            content: '';
            position: absolute;
            top: -8px; left: -8px;
            width: calc(100% + 16px);
            height: 52%;
            background: #ffbcd1;
            border: 8px solid var(--border-color);
            border-top: none;
            z-index: 2;
            transform-origin: top;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.15s;
        }

        .envelope.open {
            transform: scale(0.85) translateY(-650px) rotateX(35deg);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        
        .envelope.open::before {
            transform: rotateX(180deg);
        }

        .envelope-content {
            position: relative;
            z-index: 5;
            text-align: center;
            width: 100%;
        }

        .envelope h1 {
            font-size: 14px;
            line-height: 2;
            color: var(--border-color);
            text-shadow: 3px 3px 0px #fff;
            margin: 0 0 50px 0;
        }

        /* Custom Pure CSS Pixel-Art Star Medallion Seal */
        .pixel-seal-star {
            width: 24px; height: 24px;
            background: #fff;
            position: relative;
            margin: 0 auto;
            box-shadow: 0 12px 0 0 #fff, 0 -12px 0 0 #fff, 12px 0 0 0 #fff, -12px 0 0 0 #fff;
            animation: sealSpin 3s linear infinite;
        }

        @keyframes sealSpin {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); background: var(--pink-glow); box-shadow: 0 12px 0 0 var(--pink-glow), 0 -12px 0 0 var(--pink-glow), 12px 0 0 0 var(--pink-glow), -12px 0 0 0 var(--pink-glow); }
            100% { transform: scale(1); }
        }

        .click-hint {
            margin-top: 60px;
            font-size: 8px;
            color: #fff;
            background: var(--border-color);
            padding: 14px;
            line-height: 1.5;
            box-shadow: inset -4px -4px 0 #1b0e14;
            animation: labelFlash 1s steps(2, start) infinite;
        }

        @keyframes labelFlash { to { background-color: var(--pink-glow); } }

        /* ---------------- GAME INTERFACE MODULE ---------------- */

        .card {
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border: 8px solid var(--border-color);
            box-shadow: var(--window-shadow), inset -4px -4px 0px #fcaec7, inset 4px 4px 0px #fff;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: absolute;
            z-index: 15;
            opacity: 0;
            transform: scale(0.75) translateY(30px);
            transition: opacity 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.25), 
                        transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.25);
            pointer-events: none;
        }

        /* Smooth popup activation triggers via JS setup */
        .envelope.open + .card {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        /* Screen Change Response Animation Bump */
        .card.slide-bump {
            animation: screenVibrate 0.25s linear;
        }
        @keyframes screenVibrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.98) translateY(2px); }
        }

        .card-header {
            font-size: 8px;
            display: flex;
            justify-content: space-between;
            border-bottom: 6px dashed #f0abbf;
            padding-bottom: 14px;
            margin-bottom: 16px;
            color: #a6536b;
            letter-spacing: 1px;
        }

        /* Retro RPG Text Box Window Accent */
        .text-container {
            flex-grow: 1;
            position: relative;
            border: 4px solid #fcaec7;
            padding: 16px;
            margin-bottom: 16px;
            overflow-y: auto;
            background-color: rgba(255, 255, 255, 0.75);
            box-shadow: inset 4px 4px 0 rgba(0,0,0,0.04);
        }

        .text-display {
            font-size: 11px;
            line-height: 2.2;
            color: var(--text-color);
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        /* Retro Pixelated Indicator Prompt Symbol */
        .next-prompt-indicator {
            position: absolute;
            bottom: 8px; right: 10px;
            width: 12px; height: 8px;
            background-color: var(--pink-glow);
            box-shadow: 4px -4px 0 var(--pink-glow), -4px -4px 0 var(--pink-glow);
            display: none;
            animation: promptGlowDrop 0.5s infinite alternate steps(3);
        }

        @keyframes promptGlowDrop {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); background-color: var(--border-color); box-shadow: 4px -4px 0 var(--border-color), -4px -4px 0 var(--border-color); }
        }

        /* ---------------- INTERACTIVE NAV BUTTONS ---------------- */

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .btn {
            background-color: #fff;
            border: 4px solid var(--border-color);
            padding: 15px 6px;
            font-size: 8px;
            cursor: pointer;
            color: var(--border-color);
            box-shadow: -4px -4px 0px inset #e0dadc, 4px 4px 0px inset #fff;
            flex: 1;
            text-align: center;
        }

        .btn:active:not(:disabled) {
            box-shadow: 2px 2px 0px inset #e0dadc;
            transform: translate(2px, 2px);
        }

        .btn:disabled {
            background-color: #e6e2e4;
            border-color: #999094;
            color: #999094;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-speed {
            background-color: #fffbc2;
        }
        .btn-speed.active {
            background-color: #ffd03b;
            box-shadow: -4px -4px 0px inset #cc9f18, 4px 4px 0px inset #fff;
        }

        .page-number {
            font-size: 8px;
        }

        /* Arcade Block Cursor */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 14px;
            background-color: var(--border-color);
            animation: cursorFlash 0.6s steps(2, start) infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes cursorFlash { to { opacity: 0; } }

    </style>
</head>
<body>

    <!-- Layout Elements Design -->
    <div class="bg-grid-drift"></div>
    <div class="arcade-scanlines"></div>
    <div class="starfield" id="starfield"></div>

    <div class="game-window-container">
        
        <!-- MODULE 1: Envelope Entrance Cover -->
        <div class="envelope" id="envelope" onclick="triggerLetterInit()">
            <div class="envelope-content">
                <h1>HAPPY BIRTHDAY<br>ELAH!!</h1>
                <div class="pixel-seal-star"></div>
                <div class="click-hint">[ PRESS START ]</div>
            </div>
        </div>

        <!-- MODULE 2: YENN Text Screen Terminal Box -->
        <div class="card" id="letter-card">
            <div class="card-header">
                <span>YENN</span>
                <span class="page-number" id="page-num">1/16</span>
            </div>

            <div class="text-container">
                <div class="text-display"><span id="typed-text"></span><span class="cursor" id="text-cursor"></span></div>
                <div class="next-prompt-indicator" id="next-indicator"></div>
            </div>

            <div class="controls">
                <button class="btn" id="back-btn" onclick="prevSlide()">&lt; BACK</button>
                <button class="btn btn-speed" id="speed-btn" onclick="toggleSpeed()">1X SPEED</button>
                <button class="btn" id="next-btn" onclick="nextSlide()">NEXT &gt;</button>
            </div>
        </div>
    </div>

    <script>
        // Data logs slides configuration
        const slides = [
            "Hello, Ilah Happy Birthday!",
            "I’m wishing you the happiest birthday, and I hope you overcome every problem you’re facing right now!",
            "And uh, I made this code as a birthday letter and not a gift because I’m still trying to make or get you a gift",
            "I was even thinking about adding some mini-games here for you, but I wasn't able to since this was kind of a rushed coding project...",
            "I was even thinking about giving you a kitten, but your mom doesn’t like pets, just like you told me… sigh.",
            "Or I could make you a DIY gift or buy you some jewelry, but I suck at picking and choosing things, bro",
            "But yeah, I’ll just give it to you when we get the chance to meet each other soon;))",
            "Anyways.",
            "I’m really happy I met someone like you",
            "You’re fun to talk to, and you make everything feel awesome",
            "And tbh.",
            "I get scared talking to other people sometimes because I feel like they might see me as weird or a freak",
            "But you’re different. You make me feel comfortable",
            "You are also autistic, and honestly, it made me feel understood loll",
            "You’re funny, kind, and you get my energy.",
            "I really like talking to you, Ilah."
        ];

        let currentSlide = 0;
        let textIndex = 0;
        let isTyping = false;
        let typingTimeout;
        let typingSpeed = 55; 
        let isFastSpeed = false;

        const typedTextElement = document.getElementById("typed-text");
        const pageNumElement = document.getElementById("page-num");
        const backBtn = document.getElementById("back-btn");
        const nextBtn = document.getElementById("next-btn");
        const speedBtn = document.getElementById("speed-btn");
        const envelope = document.getElementById("envelope");
        const card = document.getElementById("letter-card");
        const indicator = document.getElementById("next-indicator");
        const cursor = document.getElementById("text-cursor");

        // Dynamic Background Block-Starfield Particle Generator
        function buildStarfieldSystem() {
            const space = document.getElementById('starfield');
            const density = 15;
            
            for(let i = 0; i < density; i++) {
                const node = document.createElement('div');
                node.className = 'block-star';
                node.style.left = Math.random() * 100 + '%';
                node.style.animationDelay = Math.random() * 12 + 's';
                node.style.animationDuration = (8 + Math.random() * 6) + 's';
                node.style.transform = `scale(${Math.random() * 0.6 + 0.4})`;
                space.appendChild(node);
            }
        }
        buildStarfieldSystem();

        // Screen Initialization Sequence Trigger
        function triggerLetterInit() {
            envelope.classList.add("open");
            setTimeout(() => {
                card.classList.add('slide-bump');
                setTimeout(() => card.classList.remove('slide-bump'), 250);
                loadSlide(0);
            }, 850); 
        }

        // Logic Output Engine for Typewriter Effect
        function runTypewriter(text) {
            if (textIndex < text.length) {
                typedTextElement.textContent += text.charAt(textIndex);
                textIndex++;
                typingTimeout = setTimeout(() => runTypewriter(text), typingSpeed);
            } else {
                isTyping = false;
                indicator.style.display = "block"; 
                cursor.style.display = "none";
                updateButtons();
            }
        }

        // Processing Slide Updates
        function loadSlide(index) {
            clearTimeout(typingTimeout);
            isTyping = true;
            indicator.style.display = "none";
            cursor.style.display = "inline-block";
            
            if(index !== currentSlide) {
                card.classList.add('slide-bump');
                setTimeout(() => card.classList.remove('slide-bump'), 250);
            }

            currentSlide = index;
            textIndex = 0;
            typedTextElement.textContent = "";
            pageNumElement.textContent = `${currentSlide + 1}/${slides.length}`;
            
            runTypewriter(slides[currentSlide]);
            updateButtons();
        }

        function nextSlide() {
            if (isTyping) {
                clearTimeout(typingTimeout);
                typedTextElement.textContent = slides[currentSlide];
                isTyping = false;
                indicator.style.display = "block";
                cursor.style.display = "none";
                updateButtons();
                return;
            }

            if (currentSlide < slides.length - 1) {
                loadSlide(currentSlide + 1);
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                loadSlide(currentSlide - 1);
            }
        }

        function toggleSpeed() {
            isFastSpeed = !isFastSpeed;
            if (isFastSpeed) {
                typingSpeed = 15; 
                speedBtn.textContent = "2X SPEED";
                speedBtn.classList.add("active");
            } else {
                typingSpeed = 55; 
                speedBtn.textContent = "1X SPEED";
                speedBtn.classList.remove("active");
            }
        }

        function updateButtons() {
            backBtn.disabled = (currentSlide === 0);
            
            if (currentSlide === slides.length - 1 && !isTyping) {
                nextBtn.textContent = "DONE <3";
                nextBtn.disabled = true;
            } else {
                nextBtn.textContent = isTyping ? "[SKIP]" : "NEXT >";
                nextBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
